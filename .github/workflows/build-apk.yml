name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cài Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cài Android SDK
        uses: android-actions/setup-android@v3

      - name: Cài thư viện
        run: npm install

      - name: Tạo dự án Android
        run: npx cap add android

      - name: Thêm quyền Camera
        run: |
          MF=android/app/src/main/AndroidManifest.xml
          if ! grep -q "android.permission.CAMERA" "$MF"; then
            sed -i 's#<application#<uses-permission android:name="android.permission.CAMERA" />\n\n    <application#' "$MF"
          fi

      - name: Đồng bộ web vào Android
        run: npx cap sync android

      - name: Build APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Tải file APK lên
        uses: actions/upload-artifact@v4
        with:
          name: cham-bai-ai-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
